<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Co.opmart Đà Nẵng - V52.5.6 Platinum</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --blue-dark: #004080; --blue-coop: #005691; --red: #ed1c24; --bg: #f0f4f8; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; overflow-x: hidden; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 10000; display: none; align-items: center; justify-content: center; flex-direction: column; backdrop-filter: blur(5px); }
        .spinner { width: 70px; height: 70px; border: 8px solid #f3f3f3; border-top: 8px solid var(--blue-coop); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { margin-top: 20px; font-weight: 900; color: var(--blue-dark); font-size: 20px; letter-spacing: 1px; }
        header { background: var(--white); padding: 15px 4%; display: flex; justify-content: space-between; align-items: center; border-bottom: 6px solid var(--red); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .main-title { color: var(--blue-dark); font-size: 30px; font-weight: 900; text-transform: uppercase; margin: 0; letter-spacing: 2px; }
        .main-container { display: grid; grid-template-columns: 400px 1fr; gap: 25px; padding: 25px; }
        .card { background: var(--white); border-radius: 20px; padding: 25px; box-shadow: 0 6px 20px rgba(0,0,0,0.05); }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; border: 3px solid #eee; background: #000; }
        .btn-cam-toggle { width: 100%; padding: 15px; background: var(--blue-coop); color: white; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; margin-bottom: 15px; }
        .stat-card { background: var(--blue-dark); color: white; text-align: center; padding: 35px; border-radius: 20px; margin-top: 25px; }
        #profile-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .profile-card { background: var(--white); width: 95%; max-width: 450px; border-radius: 35px; padding: 40px; text-align: center; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .profile-img { width: 160px; height: 160px; border-radius: 50%; border: 7px solid var(--blue-coop); object-fit: cover; margin-bottom: 20px; }
        .filter-container { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
        .btn-filter { padding: 10px 22px; border: none; border-radius: 30px; background: #dbeafe; color: var(--blue-dark); font-weight: 700; cursor: pointer; font-size: 13px; }
        .btn-filter.active { background: var(--blue-dark); color: white; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f1f5f9; color: var(--blue-dark); padding: 15px; text-align: left; border-bottom: 4px solid #e2e8f0; font-size: 13px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 15px; vertical-align: middle; }
        .badge { padding: 6px 12px; border-radius: 8px; color: #fff; font-weight: 800; font-size: 12px; }
        #hidden-input { position: fixed; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<div id="loading-overlay"><div class="spinner"></div><div class="loading-text">ĐANG XỬ LÝ...</div></div>

<div id="profile-modal">
    <div class="profile-card">
        <img id="p-img" src="" class="profile-img">
        <div id="p-name" style="font-size:28px; font-weight:900; color:var(--blue-dark); text-transform:uppercase; margin-bottom:5px;">--</div>
        <div id="p-status" style="margin:20px 0; padding:18px; border-radius:20px; color:#fff; font-weight:900; font-size:20px;">--</div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; text-align:left;">
            <div style="background:#f3f4f6; padding:12px; border-radius:12px;"><b>Bộ phận:</b><br><span id="p-dept">--</span></div>
            <div style="background:#f3f4f6; padding:12px; border-radius:12px;"><b>Nhà CC:</b><br><span id="p-prov">--</span></div>
        </div>
    </div>
</div>

<input type="text" id="hidden-input" autofocus>

<header>
    <div>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSuil-KN87kWDOj7jBEXJipuRLwTDhM3Esu8Q&s" height="55">
        <h1 class="main-title">CO.OPMART ĐÀ NẴNG</h1>
    </div>
    <div style="text-align:right;">
        <div id="txt-time" style="font-size:45px; font-weight:900; color:var(--blue-coop); line-height:1;">00:00:00</div>
        <div id="txt-date" style="font-size:16px; color:#666; font-weight:bold; margin-top:5px;">...</div>
    </div>
</header>

<div class="main-container">
    <div class="side">
        <div class="card">
            <button class="btn-cam-toggle" onclick="toggleCamera()"><i class="fa fa-camera-retro"></i> MỞ CAMERA QUÉT MÃ</button>
            <div id="reader"></div>
            <div style="text-align:center; margin-top:20px; color:#cbd5e1; font-weight:bold;"><i class="fa fa-qrcode fa-4x"></i><br><small>SẴN SÀNG</small></div>
        </div>
        <div class="stat-card">
            <div style="font-size:16px; opacity:0.8; font-weight:bold; margin-bottom:10px;">NHÂN VIÊN TRONG CA</div>
            <div style="font-size:80px; font-weight:900; line-height:1;" id="val-in">0</div>
        </div>
    </div>

    <div class="content">
        <div class="filter-container" id="filter-box">
            <button class="btn-filter active" onclick="filterData('ALL')">TẤT CẢ</button>
        </div>
        <div class="card" style="overflow-x:auto; padding:0;">
            <table>
                <thead>
                    <tr><th>Họ & Tên</th><th>Bộ phận / Nhà CC</th><th>Vào ca</th><th>Nghỉ</th><th>Lại</th><th>Về</th><th>Tổng giờ</th></tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbxHqGmt5_kFFOxedSl9wsrIlBb3OJmaAZX9FBvzgXBxFacnw5tkCw5zv_lM80Ue2szxUw/exec";
    let rawData = [], isLock = false, html5QrCode, currentFilter = 'ALL';

    // TÍNH NĂNG ĐỌC TÊN BẰNG TIẾNG ANH (HELLO)
    function speakWelcome(name) {
        if ('speechSynthesis' in window) {
            const synth = window.speechSynthesis;
            synth.cancel(); // Xóa lệnh cũ, đọc ngay lệnh mới
            const utterThis = new SpeechSynthesisUtterance("HELLO! HAVE A GOOD DAY! " );
            utterThis.lang = 'en-US'; // Chuyển sang giọng đọc tiếng Anh Mỹ
            utterThis.rate = 1.0;     // Tốc độ chuẩn tự nhiên
            synth.speak(utterThis);
        }
    }

    setInterval(() => {
        const now = new Date();
        document.getElementById('txt-time').innerText = now.toLocaleTimeString('vi-VN');
        const dStr = now.toLocaleDateString('vi-VN', { weekday: 'long', day: 'numeric', month: 'numeric' });
        if (document.getElementById('txt-date').innerText !== dStr && document.getElementById('txt-date').innerText !== "...") { loadData(); }
        document.getElementById('txt-date').innerText = dStr;
    }, 1000);

    setInterval(() => { loadData(); }, 30000);

    function focusInp() { document.getElementById('hidden-input').focus(); }
    document.addEventListener('click', focusInp);
    document.getElementById('hidden-input').addEventListener('keypress', e => {
        if(e.key === 'Enter') { handleScan(e.target.value); e.target.value = ''; }
    });

    async function handleScan(id) {
        if(!id || isLock) return;
        isLock = true;
        document.getElementById('loading-overlay').style.display = 'flex';
        try {
            const res = await fetch(API, { method: 'POST', body: JSON.stringify({ id: id.trim() }) });
            const result = await res.json();
            document.getElementById('loading-overlay').style.display = 'none';
            if(result.status === "SUCCESS") {
                speakWelcome(result.profile.name); // THỰC HIỆN ĐỌC HELLO + TÊN
                showProfile(result.profile, result.msg);
                loadData();
            }
        } catch(e) { document.getElementById('loading-overlay').style.display = 'none'; }
        setTimeout(() => isLock = false, 2000);
    }

    function showProfile(p, msg) {
        const modal = document.getElementById('profile-modal');
        document.getElementById('p-img').src = p.photo;
        document.getElementById('p-name').innerText = p.name;
        document.getElementById('p-dept').innerText = p.dept;
        document.getElementById('p-prov').innerText = p.provider;
        const st = document.getElementById('p-status');
        st.innerText = msg;
        const colors = { "LẦN 1": "#27ae60", "LẦN 2": "#f39c12", "LẦN 3": "#2980b9", "LẦN 4": "#c0392b" };
        st.style.background = "#333";
        for(let k in colors) if(msg.includes(k)) st.style.background = colors[k];
        modal.style.display = 'flex';
        setTimeout(() => { modal.style.display = 'none'; }, 4500);
    }

    async function loadData() {
        try {
            const r = await fetch(API);
            const d = await r.json();
            rawData = d.allData;
            document.getElementById('val-in').innerText = d.inShift;
            updateFilterButtons();
            renderTable();
        } catch(e) {}
    }

    function updateFilterButtons() {
        const depts = [...new Set(rawData.map(i => i.dept))];
        let html = `<button class="btn-filter ${currentFilter==='ALL'?'active':''}" onclick="filterData('ALL')">TẤT CẢ</button>`;
        depts.forEach(d => { html += `<button class="btn-filter ${currentFilter===d?'active':''}" onclick="filterData('${d}')">${d}</button>`; });
        document.getElementById('filter-box').innerHTML = html;
    }

    function filterData(dept) { currentFilter = dept; updateFilterButtons(); renderTable(); }

    function calculateHenryTime(tIn, tAnRa, tAnVao, tOut) {
        if (!tIn) return "--";
        let lastExit = tOut || tAnVao || tAnRa; 
        if (!lastExit) return "--";
        const toMinutes = (timeStr) => {
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        };
        const diffMinutes = toMinutes(lastExit) - toMinutes(tIn);
        if (diffMinutes < 0) return "0.0";
        const hours = Math.floor(diffMinutes / 60);
        const mins = diffMinutes % 60;
        return `${hours}.${mins < 10 ? '0' + mins : mins}`;
    }

    function renderTable() {
        const filtered = currentFilter === 'ALL' ? rawData : rawData.filter(i => i.dept === currentFilter);
        document.getElementById('table-body').innerHTML = filtered.map(i => {
            const displayTime = calculateHenryTime(i.tIn, i.tAnRa, i.tAnVao, i.tOut);
            return `
            <tr>
                <td><b>${i.name}</b><br><small style="color:#64748b">ID: ${i.id}</small></td>
                <td>
                    <span style="color:var(--blue-coop); font-weight:bold;">${i.dept}</span><br>
                    <small style="color:#ef4444; font-weight:600;">NCC: ${i.provider || '---'}</small>
                </td>
                <td><span class="badge" style="background:#27ae60">${i.tIn || '--'}</span></td>
                <td><span class="badge" style="background:#f39c12">${i.tAnRa || '--'}</span></td>
                <td><span class="badge" style="background:#2980b9">${i.tAnVao || '--'}</span></td>
                <td><span class="badge" style="background:#c0392b">${i.tOut || '--'}</span></td>
                <td style="font-weight:900; font-size:16px; color:var(--blue-dark);">${displayTime}</td>
            </tr>`;
        }).join('');
    }

    function toggleCamera() {
        if (!html5QrCode) {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 280 }, handleScan);
        } else {
            html5QrCode.stop().then(() => { html5QrCode = null; document.getElementById('reader').innerHTML = ""; });
        }
    }
    window.onload = () => { loadData(); focusInp(); };
</script>
</body>
</html>
